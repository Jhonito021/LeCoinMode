<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - For You</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="retour" style="text-align: end;">
                <a href="index.html"><i class="fas fa-chevron-left"></i></a>
            </div>
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-heart"></i>
                    <span> For You</span>
                </div>
                <h1 class="auth-title">Connexion</h1>
                <!-- <p class="auth-subtitle">Content de vous revoir !</p> -->
            </div>
            
            <!-- <div class="social-login">
                <button class="social-btn facebook">
                    <i class="fab fa-facebook-f"></i>
                    <span>Facebook</span>
                </button>
                <button class="social-btn google">
                    <i class="fab fa-google"></i>
                    <span>Google</span>
                </button>
            </div>
            
            <div class="divider">
                <span>Ou connectez-vous avec votre email</span>
            </div> -->
            
            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="votre@email.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Mot de passe</label>
                    <div class="password-container">
                        <input type="password" class="form-control" id="password" placeholder="Votre mot de passe" required>
                        <button type="button" class="password-toggle" id="togglePassword">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
                    <label style="display: flex; align-items: center; gap: 0.5rem;">
                        <input type="checkbox" id="remember">
                        <span>Se souvenir de moi</span>
                    </label>
                    <a href="#" class="auth-link">Mot de passe oublié ?</a>
                </div>
                
                <button type="submit" class="btn" style="width: 100%;">Se connecter</button>
            </form>
            
            <div class="auth-footer">
                <p>Pas encore de compte ? <a href="register.html" class="auth-link">Créer un compte</a></p>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
