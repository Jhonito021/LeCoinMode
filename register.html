<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - For You</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="retour" style="text-align: end;">
                <a href="index.html"><i class="fas fa-chevron-left"></i></a>
            </div>
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-heart"></i>
                    <span> For You</span>
                </div>
                <h1 class="auth-title">Inscription</h1>
                <!-- <p class="auth-subtitle">Rejoignez notre communauté</p> -->
            </div>
            
            <!-- <div class="social-login">
                <button class="social-btn facebook">
                    <i class="fab fa-facebook-f"></i>
                    <span>Facebook</span>
                </button>
                <button class="social-btn google">
                    <i class="fab fa-google"></i>
                    <span>Google</span>
                </button>
            </div>
            
            <div class="divider">
                <span>Ou inscrivez-vous avec votre email</span>
            </div> -->
            
            <form class="auth-form" id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="firstName">Prénom</label>
                        <input type="text" class="form-control" id="firstName" placeholder="Votre prénom" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="lastName">Nom</label>
                        <input type="text" class="form-control" id="lastName" placeholder="Votre nom" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="votre@email.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="birthDate">Date de naissance</label>
                    <input type="date" class="form-control" id="birthDate" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="gender">Genre</label>
                    <select class="form-control" id="gender" required>
                        <option value="">Sélectionnez votre genre</option>
                        <option value="male">Homme</option>
                        <option value="female">Femme</option>
                        <option value="other">Autre</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Mot de passe</label>
                    <div class="password-container">
                        <input type="password" class="form-control" id="password" placeholder="Créez un mot de passe" required>
                        <button type="button" class="password-toggle" id="togglePassword">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="password-strength-bar" id="passwordStrengthBar"></div>
                    </div>
                    <div class="password-requirements" id="passwordRequirements">
                        <div class="requirement" id="reqLength">
                            <i class="fas fa-circle"></i>
                            <span>Au moins 8 caractères</span>
                        </div>
                        <div class="requirement" id="reqUpper">
                            <i class="fas fa-circle"></i>
                            <span>Une lettre majuscule</span>
                        </div>
                        <div class="requirement" id="reqLower">
                            <i class="fas fa-circle"></i>
                            <span>Une lettre minuscule</span>
                        </div>
                        <div class="requirement" id="reqNumber">
                            <i class="fas fa-circle"></i>
                            <span>Un chiffre</span>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirmer le mot de passe</label>
                    <div class="password-container">
                        <input type="password" class="form-control" id="confirmPassword" placeholder="Confirmez votre mot de passe" required>
                        <button type="button" class="password-toggle" id="toggleConfirmPassword">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                    <div id="passwordMatch" style="margin-top: 0.5rem; font-size: 0.8rem;"></div>
                </div>
                
                <div class="terms">
                    <label style="display: flex; align-items: flex-start; gap: 0.5rem;">
                        <input type="checkbox" id="acceptTerms" required style="margin-top: 0.2rem;">
                        <span>J'accepte les <a href="#" class="auth-link">conditions d'utilisation</a> et la <a href="#" class="auth-link">politique de confidentialité</a></span>
                    </label>
                </div>
                
                <button type="submit" class="btn" style="width: 100%;">Créer mon compte</button>
            </form>
            
            <div class="auth-footer">
                <p>Déjà membre ? <a href="login.html" class="auth-link">Se connecter</a></p>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
